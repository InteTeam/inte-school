services:

  php-fpm:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    volumes:
      - .:/var/www
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini
    environment:
      - APP_ENV=${APP_ENV:-local}
    networks:
      - inteschool
    depends_on:
      - postgresql
      - redis

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "127.0.0.1:8100:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - inteschool
      - proxy-tier
    depends_on:
      - php-fpm

  postgresql:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${DB_DATABASE:-inteschool}
      POSTGRES_USER: ${DB_USERNAME:-inteschool}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - postgresql_data:/var/lib/postgresql/data
    networks:
      - inteschool
    ports:
      - "127.0.0.1:5432:5432"

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - inteschool

  queue-worker:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    command: php artisan horizon
    volumes:
      - .:/var/www
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini
    environment:
      - APP_ENV=${APP_ENV:-local}
    networks:
      - inteschool
    depends_on:
      - postgresql
      - redis
    restart: unless-stopped

  reverb:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    command: php artisan reverb:start --host=0.0.0.0 --port=8080
    ports:
      - "127.0.0.1:8103:8080"
    volumes:
      - .:/var/www
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini
    environment:
      - APP_ENV=${APP_ENV:-local}
    networks:
      - inteschool
      - proxy-tier
    depends_on:
      - redis
    restart: unless-stopped

  # Dev profile only
  npm:
    image: node:22-alpine
    profiles: ["dev"]
    working_dir: /var/www
    volumes:
      - .:/var/www
    command: sh -c "npm install && npm run dev"
    ports:
      - "127.0.0.1:5180:5173"
    networks:
      - inteschool

  mailpit:
    image: axllent/mailpit:latest
    profiles: ["dev"]
    ports:
      - "127.0.0.1:8102:8025"
      - "127.0.0.1:1025:1025"
    networks:
      - inteschool

  adminer:
    image: adminer:latest
    profiles: ["dev"]
    ports:
      - "127.0.0.1:8101:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgresql
    networks:
      - inteschool

  # Prod profile only
  caddy:
    image: caddy:2-alpine
    profiles: ["prod"]
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/caddy/Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - inteschool
      - proxy-tier
    restart: unless-stopped

networks:
  inteschool:
    driver: bridge
  proxy-tier:
    external: true
    name: proxy-tier

volumes:
  postgresql_data:
  redis_data:
  caddy_data:
  caddy_config:
